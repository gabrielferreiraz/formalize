version: "3.9"

services:
  # ------------------------------------------------------------------
  # PostgreSQL
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: formalize_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: formalize
      POSTGRES_PASSWORD: formalize
      POSTGRES_DB: formalize_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formalize -d formalize_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # Next.js App
  # ------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: formalize_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://formalize:formalize@postgres:5432/formalize_dev?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Hot reload em desenvolvimento
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
